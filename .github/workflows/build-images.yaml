name: Build and publish images

# Builds the server images from the current source and publishes them, tagged
# and cosign-signed, to GHCR — both the default docker-compose flow and the
# Helm chart consume them from there. The ml-api service ships in several
# hardware variants (CUDA, slim CPU/ONNX, Jetson/L4T). The workflow also
# publishes the in-repo Helm chart as a signed OCI artifact with exact image
# tags baked in, and pins the compose files to the images each build pushed
# (see pin-compose below).

on:
  # The release branch is the deploy branch; rebuild whenever it moves.
  push:
    branches: [release]
  workflow_dispatch: {}

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # Compute the shared namespace and version once so the image builds and the
  # chart publish agree on a single value. If these were computed independently
  # in two jobs, a commit crossing a UTC midnight boundary between them could
  # produce two different CalVers and the chart would pin image tags that were
  # never pushed.
  version:
    runs-on: ubuntu-latest
    outputs:
      ns: ${{ steps.ns.outputs.ns }}
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the commit date and any tags are available for
          # versioning.
          fetch-depth: 0

      - name: Compute image namespace (GHCR requires a lowercase owner)
        id: ns
        run: echo "ns=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Compute version
        id: ver
        run: |
          # The release branch carries no tag or in-repo VERSION, so derive a
          # CalVer from the commit date (UTC) — deterministic and monotonic with
          # commit order. It is day-granular: two commits on the same UTC day
          # share it, and the second run moves the tag. The sha-<short> tag below
          # is the immutable, guaranteed-unique per-commit pin, and the combined
          # <calver>-<short> tag is the human-readable form of the same pin. If
          # the project ever starts tagging releases, an exact tag on the commit
          # takes precedence.
          tag="$(git describe --tags --exact-match 2>/dev/null || true)"
          if [ -n "${tag}" ]; then
            version="${tag#v}"
          else
            version="$(date -u -d "@$(git show --no-patch --format=%ct HEAD)" +'%Y.%-m.%-d')"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "${GITHUB_OUTPUT}"

  # Multi-arch images (web and the slim CPU ml-api) are built once per platform
  # on native runners — no QEMU — and pushed by digest only; the tags are
  # attached when the per-platform digests are merged into one manifest list in
  # the merge-manifests job below.
  build-multiarch:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      # fail-fast off so one platform leg failing does not cancel the others.
      # Isolation between IMAGES is restored in merge-manifests: it runs even
      # when this job reports failure, and each image's merge only needs that
      # image's own digests — so a broken ml-api-cpu leg cannot block web's
      # tags, and vice versa. What one failing platform leg does block is the
      # manifest list of its own image, by design: a half-populated list would
      # be worse than a missing tag.
      fail-fast: false
      matrix:
        include:
          - name: web
            context: backend
            file: backend/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
          - name: web
            context: backend
            file: backend/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - name: ml-api-cpu
            context: ml_api
            file: ml_api/Containerfile.cpu
            platform: linux/amd64
            runner: ubuntu-latest
          - name: ml-api-cpu
            context: ml_api
            file: ml_api/Containerfile.cpu
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Versioning moved to the version job, so a shallow checkout of HEAD is
        # enough to build the image.

      - name: Prepare platform identifier
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "pair=${platform//\//-}" >> "${GITHUB_OUTPUT}"

      - name: Move the prebuilt frontend into the web build context
        if: matrix.name == 'web'
        run: |
          # The backend image expects the prebuilt Vue bundle (checked into the
          # release branch) at /frontend, which docker-compose supplies as a bind
          # mount. Bake it into the image instead.
          mv frontend backend/frontend
          echo 'RUN ln -s /app/frontend /frontend' >> backend/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.version.outputs.ns }}/obico-${{ matrix.name }}
          labels: |
            org.opencontainers.image.title=obico-${{ matrix.name }}
            org.opencontainers.image.description=Obico ${{ matrix.name }} image built from obico-server source
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          # Digest-only push: the manifest list with the actual tags is created
          # in merge-manifests once every platform digest exists.
          outputs: type=image,name=${{ needs.version.outputs.ns }}/obico-${{ matrix.name }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ steps.platform.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.name }}-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
          # Artifacts outlive a run attempt; without this, "Re-run all jobs"
          # after a partial failure dies on the artifact name conflict.
          overwrite: true

  # Combine the per-platform digests into one multi-arch manifest list per
  # image, attach the tags, and sign the list.
  merge-manifests:
    needs: [version, build-multiarch]
    # Run even when build-multiarch reports failure: a failed platform leg of
    # one image must not block the other image's tags. Incomplete digests for
    # THIS image are caught by the exact-count check in the create step below
    # (the artifact download itself succeeds even with zero matches), which is
    # the correct per-image outcome.
    if: ${{ !cancelled() && needs.version.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [web, ml-api-cpu]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.name }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.version.outputs.ns }}/obico-${{ matrix.name }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.version }}-${{ needs.version.outputs.short_sha }}
            type=raw,value=sha-${{ needs.version.outputs.short_sha }}
            type=raw,value=release,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create the manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ needs.version.outputs.ns }}/obico-${{ matrix.name }}
        run: |
          set -euo pipefail
          mapfile -t tag_args < <(jq -r '.tags[] | "-t", .' <<< "${DOCKER_METADATA_OUTPUT_JSON}")
          images=()
          for digest_file in *; do
            [ -f "${digest_file}" ] || continue
            images+=("${IMAGE}@sha256:${digest_file}")
          done
          # The artifact download succeeds even when a platform leg failed and
          # left its digest behind — refuse to publish a half-populated list.
          # The expected count equals the number of platforms per image in the
          # build-multiarch matrix; grow them together.
          if [ "${#images[@]}" -ne 2 ]; then
            echo "::error::expected 2 platform digests for ${IMAGE}, found ${#images[@]}"
            exit 1
          fi
          docker buildx imagetools create "${tag_args[@]}" "${images[@]}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the manifest list (keyless)
        env:
          IMAGE: ${{ needs.version.outputs.ns }}/obico-${{ matrix.name }}
          TAG: ${{ needs.version.outputs.version }}
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{json .Manifest}}' | jq -r '.digest')"
          cosign sign --yes "${IMAGE}@${digest}"

  # Single-platform images: the CUDA ml-api build is amd64-only.
  build-single:
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ml-api-gpu
            context: ml_api
            file: ml_api/Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.version.outputs.ns }}/obico-${{ matrix.name }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.version }}-${{ needs.version.outputs.short_sha }}
            type=raw,value=sha-${{ needs.version.outputs.short_sha }}
            type=raw,value=release,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=obico-${{ matrix.name }}
            org.opencontainers.image.description=Obico ${{ matrix.name }} image built from obico-server source
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ needs.version.outputs.ns }}/obico-${{ matrix.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  # The Jetson inference image, in its own job so that this best-effort build
  # can fail without blocking the chart publish or the compose pins — the
  # mandatory publications only depend on the images they actually reference.
  # It uses the same Dockerfile as the CUDA image: on linux/arm64 the FROM line
  # resolves the ml_api_base:1.4 manifest list to its arm64 half, which is the
  # L4T/JetPack base. Publishing it under an explicit obico-ml-api-jetson name
  # (instead of hiding it in a manifest's arm64 slot) keeps the hardware target
  # visible. Best-effort tier: exercised as a CI build only, not runtime-tested
  # on hardware. One-time step after the first successful build: GHCR creates
  # new packages private, so the obico-ml-api-jetson package must be flipped
  # to public once before anonymous pulls work (the same step the other three
  # packages already went through).
  build-jetson:
    needs: version
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.version.outputs.ns }}/obico-ml-api-jetson
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.version }}-${{ needs.version.outputs.short_sha }}
            type=raw,value=sha-${{ needs.version.outputs.short_sha }}
            type=raw,value=release,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=obico-ml-api-jetson
            org.opencontainers.image.description=Obico ml-api image for NVIDIA Jetson (L4T), built from obico-server source
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ml_api
          file: ml_api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ml-api-jetson
          cache-to: type=gha,mode=max,scope=ml-api-jetson

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ needs.version.outputs.ns }}/obico-ml-api-jetson
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  publish-chart:
    # needs the image jobs so the packaged chart never pins image tags that are
    # not pushed yet, and needs version for the shared namespace/CalVer outputs.
    # Deliberately does NOT need build-jetson: the chart references only the
    # web/cpu/gpu images, and the best-effort Jetson build must not gate it.
    needs: [version, merge-manifests, build-single]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Only the working tree is packaged; the version comes from the version
        # job, so no history is needed.

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # Pin a version new enough to map Chart.yaml sources[0] to the
          # org.opencontainers.image.source OCI annotation on push (since 3.12).
          # That annotation is what links the GHCR package to this repository and
          # keeps a later re-push from failing on a permission check.
          version: v3.18.4

      - name: Log in to GHCR (Docker config)
        # cosign (via go-containerregistry) reads credentials from the Docker
        # config file, which Helm's own registry login does not populate. Without
        # this the chart push would succeed but cosign would fail to push the
        # signature to GHCR unauthenticated.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR (Helm registry)
        # helm push authenticates from Helm's own registry store (separate from
        # the Docker config above on Helm 3.14+), so log in for it explicitly.
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Bake the matching images into the chart
        env:
          NS: ${{ needs.version.outputs.ns }}
          VERSION: ${{ needs.version.outputs.version }}
          SHORT_SHA: ${{ needs.version.outputs.short_sha }}
          # The canonical repo URL of whoever is publishing. Helm maps
          # sources[0] to org.opencontainers.image.source, and GHCR links a
          # package to a repository by matching that annotation — so it must name
          # the repo the workflow actually runs in, not the hardcoded upstream in
          # the in-repo Chart.yaml, or the fork's package links to the wrong repo
          # (and the in-repo value carries a trailing slash GHCR would not match).
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          # Pin the chart to the exact images it was built alongside instead of
          # the moving "release" tag. Point every image repository at the
          # namespace the build job actually pushed to — correct whether the
          # workflow runs on upstream or a fork, not only when the owner matches
          # the in-repo defaults — and pin each image to its immutable per-commit
          # sha-<short> tag, so a second release commit on the same UTC day cannot
          # silently move the images a published chart references (the CalVer tag
          # is day-granular and would). The chart itself is versioned by the
          # build's CalVer, with appVersion set to the same CalVer; CalVer is
          # valid semver, so it is a legal chart version. This mutates only the
          # throwaway CI workspace; the in-repo values.yaml (empty tag -> the
          # "release" fallback) and Chart.yaml version stay as-is for git-based
          # installs. yq preserves the surrounding comments.
          yq --inplace '
            .image.web.repository = strenv(NS) + "/obico-web"
            | .image.web.tag = "sha-" + strenv(SHORT_SHA)
            | .image.mlApi.cpu.repository = strenv(NS) + "/obico-ml-api-cpu"
            | .image.mlApi.cpu.tag = "sha-" + strenv(SHORT_SHA)
            | .image.mlApi.gpu.repository = strenv(NS) + "/obico-ml-api-gpu"
            | .image.mlApi.gpu.tag = "sha-" + strenv(SHORT_SHA)
          ' charts/obico/values.yaml
          yq --inplace '
            .version = strenv(VERSION)
            | .appVersion = strenv(VERSION)
            | .sources[0] = strenv(SOURCE_URL)
          ' charts/obico/Chart.yaml

      - name: Package the chart
        run: helm package charts/obico

      - name: Push the chart to GHCR as an OCI artifact
        id: push
        env:
          NS: ${{ needs.version.outputs.ns }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # helm push writes "Pushed: <ref>" and "Digest: <sha256:...>" to
          # stderr; capture both so the digest can be signed. The chart lands at
          # oci://<ns>/charts/obico:<version>, mirroring the images' lowercase
          # owner namespace.
          helm push "obico-${VERSION}.tgz" "oci://${NS}/charts" 2>&1 | tee push.log
          digest="$(grep --only-matching --extended-regexp 'sha256:[a-f0-9]+' push.log | head --lines 1)"
          if [ -z "${digest}" ]; then
            echo "::error::could not parse the pushed chart digest from helm push output"
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the chart (keyless)
        env:
          REF: ${{ needs.version.outputs.ns }}/charts/obico
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${REF}@${DIGEST}"

  # After every successful release build, pin the compose files to the images
  # that build just pushed. The pin cannot live in the release commit itself —
  # the image for a commit exists only after this workflow has run on it — so a
  # follow-up bot commit carries it, and [skip ci] keeps the bump from
  # triggering another build. When a release cut rewrites the branch, any
  # previous bump commit disappears with it; the build that the cut triggers
  # then re-applies a fresh pin, so the files converge after every build.
  pin-compose:
    # Push events only: a workflow_dispatch re-run of an older commit must not
    # move the pins backwards. Runs when every image the compose files pin
    # unconditionally (web + cpu via merge-manifests, gpu via build-single)
    # succeeded; the best-effort Jetson build is allowed to fail, in which
    # case the jetson override keeps its previous pin (see the step-level
    # guard below).
    if: ${{ !cancelled() && github.event_name == 'push' && needs.merge-manifests.result == 'success' && needs.build-single.result == 'success' }}
    needs: [version, merge-manifests, build-single, build-jetson]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pin the default compose images to this build
        env:
          NS: ${{ needs.version.outputs.ns }}
          PIN: ${{ needs.version.outputs.version }}-${{ needs.version.outputs.short_sha }}
        run: |
          # sed rather than yq: a yq round-trip rewrites the compose file's
          # merge keys (<<: becomes !!merge <<:), so every bot commit would
          # carry formatting noise. The image lines are unique anchored
          # patterns, and the web/tasks services inherit theirs from the
          # x-web-defaults anchor, so one line covers both. The greps after
          # each sed turn a silently non-matching pattern (renamed image,
          # reformatted line) into a loud failure instead of a stale pin.
          sed -i -E "s#image: ghcr\.io/[^/]+/obico-web:.*#image: ${NS}/obico-web:${PIN}#" docker-compose.yml
          grep -q "obico-web:${PIN}" docker-compose.yml || { echo "::error::web pin pattern did not match in docker-compose.yml"; exit 1; }
          sed -i -E "s#image: ghcr\.io/[^/]+/obico-ml-api-gpu:.*#image: ${NS}/obico-ml-api-gpu:${PIN}#" docker-compose.yml
          grep -q "obico-ml-api-gpu:${PIN}" docker-compose.yml || { echo "::error::ml-api-gpu pin pattern did not match in docker-compose.yml"; exit 1; }
          sed -i -E "s#image: ghcr\.io/[^/]+/obico-ml-api-cpu:.*#image: ${NS}/obico-ml-api-cpu:${PIN}#" docker-compose.cpu.yml
          grep -q "obico-ml-api-cpu:${PIN}" docker-compose.cpu.yml || { echo "::error::ml-api-cpu pin pattern did not match in docker-compose.cpu.yml"; exit 1; }

      - name: Pin the Jetson image to this build
        # Skipped when the best-effort Jetson build failed — the override then
        # keeps referencing the previous successfully built image.
        if: ${{ needs.build-jetson.result == 'success' }}
        env:
          NS: ${{ needs.version.outputs.ns }}
          PIN: ${{ needs.version.outputs.version }}-${{ needs.version.outputs.short_sha }}
        run: |
          sed -i -E "s#image: ghcr\.io/[^/]+/obico-ml-api-jetson:.*#image: ${NS}/obico-ml-api-jetson:${PIN}#" docker-compose.jetson.yml
          grep -q "obico-ml-api-jetson:${PIN}" docker-compose.jetson.yml || { echo "::error::jetson pin pattern did not match in docker-compose.jetson.yml"; exit 1; }

      - name: Validate the pinned compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.cpu.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.jetson.yml config --quiet

      - name: Commit and push the pin
        env:
          PIN: ${{ needs.version.outputs.version }}-${{ needs.version.outputs.short_sha }}
        run: |
          if git diff --quiet; then
            echo "pins already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml docker-compose.cpu.yml docker-compose.jetson.yml
          git commit --message "chore: pin compose images to ${PIN} [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  # Registry-side regression net: the pins in the compose files must reference
  # images that actually exist and are anonymously pullable. (The pure config
  # validation of the compose combinations lives in validate-compose.yaml,
  # which also runs on pull requests.)
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify the pinned images exist
        run: |
          set -euo pipefail
          # A pin that references a tag nobody pushed is exactly the failure
          # mode the sed-based pin job could produce if it ever drifts; make
          # the next build after such a breakage fail loudly. The Jetson pin
          # is best-effort (its first tag only appears once the Jetson build
          # has succeeded on this branch), so it only warns.
          for f in docker-compose.yml docker-compose.cpu.yml; do
            grep -oE 'image: ghcr\.io/[^ ]+' "$f" | sed 's/^image: //'
          done | sort -u | while read -r ref; do
            docker manifest inspect "$ref" > /dev/null || { echo "::error::pinned image ${ref} does not exist"; exit 1; }
          done
          # The Jetson pin is best-effort, and its failure modes need telling
          # apart: an anonymous registry probe distinguishes "never published"
          # from "published but the GHCR package was left private" (new GHCR
          # packages are created private and need a one-time visibility flip).
          # Both stay warnings — the registry does not reliably expose the
          # difference for all states, so neither may hard-fail the build.
          jetson_ref="$(grep -oE 'image: ghcr\.io/[^ ]+' docker-compose.jetson.yml | sed 's/^image: //')"
          repo="${jetson_ref%:*}"; repo="${repo#ghcr.io/}"; tag="${jetson_ref##*:}"
          token="$(curl -s "https://ghcr.io/token?scope=repository:${repo}:pull" | jq -r .token)"
          code="$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${token}" -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json" "https://ghcr.io/v2/${repo}/manifests/${tag}")"
          case "${code}" in
            200) echo "jetson pin ${jetson_ref} exists and is anonymously pullable" ;;
            404) echo "::warning::jetson pin ${jetson_ref} not published yet (expected until the first successful Jetson build)" ;;
            401|403) echo "::warning::jetson pin ${jetson_ref} is not anonymously pullable — if the Jetson build has succeeded, flip the GHCR package visibility to public (new packages are created private)" ;;
            *) echo "::warning::unexpected HTTP ${code} while probing ${jetson_ref}" ;;
          esac

