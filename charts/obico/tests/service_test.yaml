suite: test services
templates:
  - service.yaml
tests:
  - it: should create web and ml-api services by default
    asserts:
      - hasDocuments:
          count: 2

  - it: should create the web service
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-obico-web
      - equal:
          path: spec.type
          value: ClusterIP
      - contains:
          path: spec.ports
          content:
            name: http
            port: 3334
            targetPort: http
            protocol: TCP
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: web

  - it: should create the ml-api service
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-obico-ml-api
      - contains:
          path: spec.ports
          content:
            name: http
            port: 3333
            targetPort: http
            protocol: TCP
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: ml-api

  - it: should not create the ml-api service when ml-api disabled
    set:
      mlApi.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-obico-web

  - it: should support a custom web port
    documentIndex: 0
    set:
      service.web.port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should have no annotations by default on the web service
    documentIndex: 0
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should support custom annotations on the web service
    documentIndex: 0
    set:
      service.web.annotations:
        custom.annotation/key: "value"
    asserts:
      - equal:
          path: metadata.annotations["custom.annotation/key"]
          value: "value"
