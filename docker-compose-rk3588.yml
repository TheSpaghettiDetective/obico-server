services:
  ml_api:
    # Local image name so the RK3588 build never masquerades as the published
    # GHCR tag pinned in the base compose file.
    image: obico-ml-api-rk3588:local
    build:
      context: ml_api
      args:
        IMAGE_TAG_SUFFIX: -rk3588
    security_opt:
      - systempaths=unconfined
      - apparmor=unconfined
    devices:
      - /dev/dri:/dev/dri
      - /dev/mpp_service:/dev/mpp_service
