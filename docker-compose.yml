x-web-defaults: &web-defaults
  restart: unless-stopped
  # Prebuilt image, pinned to an exact release build. CI rewrites this pin to
  # the <calver>-<short-sha> form after every successful release build; the
  # initial value is the immutable sha tag of the latest build published
  # before that scheme existed. To build from source instead, use:
  # docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
  image: ghcr.io/thespaghettidetective/obico-web:sha-49c0bc70
  volumes:
    - ./backend:/app
    # The frontend is mounted twice on purpose. The prebuilt image carries
    # /frontend as a symlink to /app/frontend, and a bind mount onto a symlink
    # path gets resolved and then shadowed by the /app mount above — so the
    # second entry mounts the checkout at the symlink's target. A locally built
    # image (docker-compose.build.yml, the dev override) has no such symlink
    # and uses the first entry, exactly as before. Both point at the same
    # directory, so whichever one applies, Django reaches the checkout's
    # frontend through /app/../frontend. Side effect of the second entry: the
    # first start creates an empty backend/frontend/ directory on the host as
    # its mountpoint — harmless, and invisible to git.
    - ./frontend:/frontend
    - ./frontend:/app/frontend
  depends_on:
    - redis
  environment:
    OCTOPRINT_TUNNEL_PORT_RANGE: '0-0'
    EMAIL_HOST: '${EMAIL_HOST-}'
    EMAIL_HOST_USER: '${EMAIL_HOST_USER-}'
    EMAIL_HOST_PASSWORD: '${EMAIL_HOST_PASSWORD-}'
    EMAIL_PORT: '${EMAIL_PORT-587}'
    EMAIL_USE_TLS: '${EMAIL_USE_TLS-True}'
    DEFAULT_FROM_EMAIL: '${DEFAULT_FROM_EMAIL-changeme@example.com}'
    DEBUG: '${DEBUG-False}'    # Don't set DEBUG to True unless you know what you are doing. Otherwise the static files will be cached in browser until hard-refresh
    ADMIN_IP_WHITELIST: '${ADMIN_IP_WHITELIST-}'
    SITE_USES_HTTPS: '${SITE_USES_HTTPS-False}'
    SITE_IS_PUBLIC: '${SITE_IS_PUBLIC-False}'
    CSRF_TRUSTED_ORIGINS: '${CSRF_TRUSTED_ORIGINS-}'
    SOCIAL_LOGIN: '${SOCIAL_LOGIN-False}'
    REDIS_URL: '${REDIS_URL-redis://redis:6379}'
    DATABASE_URL: '${DATABASE_URL-sqlite:////app/db.sqlite3}'
    INTERNAL_MEDIA_HOST: '${INTERNAL_MEDIA_HOST-http://web:3334}'
    ML_API_HOST: '${ML_API_HOST-http://ml_api:3333}'
    ACCOUNT_ALLOW_SIGN_UP: '${ACCOUNT_ALLOW_SIGN_UP-False}'
    WEBPACK_LOADER_ENABLED: '${WEBPACK_LOADER_ENABLED-False}'
    TELEGRAM_BOT_TOKEN: '${TELEGRAM_BOT_TOKEN-}'
    TWILIO_ACCOUNT_SID: '${TWILIO_ACCOUNT_SID-}'
    TWILIO_AUTH_TOKEN: '${TWILIO_AUTH_TOKEN-}'
    TWILIO_FROM_NUMBER: '${TWILIO_FROM_NUMBER-}'
    SENTRY_DSN: '${SENTRY_DSN-}'
    PUSHOVER_APP_TOKEN: '${PUSHOVER_APP_TOKEN-}'
    SLACK_CLIENT_ID: '${SLACK_CLIENT_ID-}'
    SLACK_CLIENT_SECRET: '${SLACK_CLIENT_SECRET-}'
    DJANGO_SECRET_KEY: '${DJANGO_SECRET_KEY-}'
    SYNDICATE: '${SYNDICATE-}'
    VERSION:
    LLM_API_KEY: '${LLM_API_KEY-}'
    LLM_BASE_URL: '${LLM_BASE_URL-https://api.openai.com/v1}'
    LLM_MODEL_NAME: '${LLM_MODEL_NAME-gpt-4o}'
    VLM_API_KEY: '${VLM_API_KEY-}'
    VLM_BASE_URL: '${VLM_BASE_URL-https://api.openai.com/v1}'
    VLM_MODEL_NAME: '${VLM_MODEL_NAME-gpt-4o}'
    JUSPRIN_BRAND_NAME: '${JUSPRIN_BRAND_NAME-JusPrin}'


services:
  ml_api:
    hostname: ml_api
    restart: unless-stopped
    # The CUDA-based inference image — the same one every install used to build
    # locally. It runs fine without a GPU (inference falls back to the CPU
    # backend); to actually use an NVIDIA GPU, add a docker-compose.override.yml
    # that grants device access (see the server guides). Variants:
    #   - NVIDIA Jetson:      docker compose -f docker-compose.yml -f docker-compose.jetson.yml up -d
    #   - build from source:  docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
    image: ghcr.io/thespaghettidetective/obico-ml-api-gpu:sha-49c0bc70
    environment:
      DEBUG: 'True'
      FLASK_APP: 'server.py'
      # ML_API_TOKEN:
    tty: true
    command: bash -c "gunicorn --bind 0.0.0.0:3333 --workers 1 wsgi"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --no-check-certificate http://ml_api:3333/hc/"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    <<: *web-defaults
    hostname: web
    ports:
      - "3334:3334"
    depends_on:
      - ml_api
    command: sh -c 'python manage.py migrate && python manage.py collectstatic -v 2 --noinput && daphne -b 0.0.0.0 -p 3334 config.routing:application'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --no-check-certificate http://web:3334/hc/"]
      start_period: 30s
      interval: 90s
      timeout: 20s
      retries: 3

  tasks:
    <<: *web-defaults
    hostname: tasks
    command: sh -c "celery -A config worker --beat -l info -c 2 -Q realtime,celery"
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping"]
      start_period: 15s
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    restart: unless-stopped
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping" ]
      start_period: 15s
      interval: 15s
      timeout: 10s
      retries: 20
